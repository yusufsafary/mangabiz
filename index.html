<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HookManga</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui,sans-serif}

body{
  background:#050505;
  color:white;
}

/* BG */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle at 30% 20%, rgba(255,45,85,0.15), transparent 40%),
             radial-gradient(circle at 70% 80%, rgba(0,120,255,0.12), transparent 40%);
  z-index:-1;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:14px 18px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{font-weight:700}
.logo span{color:#ff2d55}

.lang span{
  margin-left:10px;
  opacity:0.6;
  cursor:pointer;
}

/* MENU */
.menu{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:12px;
  font-size:14px;
}

.menu span{
  opacity:0.5;
  cursor:pointer;
}

.menu span.active{
  opacity:1;
  color:#ff2d55;
}

/* HERO */
.hero{
  text-align:center;
  padding:50px 20px 20px;
}

.hero h1{
  font-size:24px;
}

.hero span{
  background:linear-gradient(90deg,#ff2d55,#ff7aa2);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  opacity:0.6;
  font-size:14px;
}

/* CARD */
.card{
  max-width:500px;
  margin:20px auto;
  padding:20px;
  background:rgba(255,255,255,0.03);
  border-radius:16px;
}

/* INPUT */
textarea{
  width:100%;
  height:120px;
  background:#0f0f0f;
  border:none;
  border-radius:12px;
  padding:12px;
  color:white;
}

/* BUTTON */
button{
  width:100%;
  margin-top:12px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#ff2d55;
  color:white;
  cursor:pointer;
}

/* OUTPUT */
.output{
  margin-top:12px;
  padding:12px;
  background:#0f0f0f;
  border-radius:12px;
}

/* SECTION */
.section{display:none}
.section.active{display:block}

/* FOOTER */
footer{
  text-align:center;
  padding:40px 20px;
  opacity:0.7;
}

.badge{
  margin-top:15px;
}

.badge img{
  width:170px;
  border-radius:12px;
  opacity:0.9;
}
</style>
</head>

<body>

<div class="bg"></div>

<header>
  <div class="logo">HOOK<span>MANGA</span></div>
  <div class="lang">
    <span onclick="setLang('en')">EN</span>
    <span onclick="setLang('jp')">JP</span>
  </div>
</header>

<div class="menu">
  <span onclick="show('home')" class="active">Home</span>
  <span onclick="show('how')">How</span>
  <span onclick="show('about')">About</span>
  <span onclick="show('legal')">Legal</span>
</div>

<!-- HOME -->
<div id="home" class="section active">

  <div class="hero">
    <h1 data-en="Generate <span>Viral</span> Manga Hooks"
        data-jp="バイラル<span>漫画フック</span>を生成"></h1>

    <p data-en="Create emotional story hooks in seconds"
       data-jp="数秒で感情的なストーリーを生成"></p>
  </div>

  <div class="card">
    <textarea id="input" placeholder="Describe your idea..."></textarea>
    <button onclick="generate()">Generate</button>
    <div class="output" id="output">...</div>
  </div>

</div>

<!-- HOW -->
<div id="how" class="section card">
  <h2>How</h2><br>
  <p data-en="Describe → Generate → Go Viral"
     data-jp="説明 → 生成 → バイラル"></p>
</div>

<!-- ABOUT -->
<div id="about" class="section card">
  <h2>About</h2><br>
  <p data-en="AI tool for creating high-retention manga hooks."
     data-jp="高いリテンションの漫画フックを生成するAIツール。"></p>
</div>

<!-- LEGAL -->
<div id="legal" class="section card">
  <h2>Legal</h2><br>
  <p data-en="Use at your own risk."
     data-jp="自己責任で使用してください。"></p>
</div>

<footer>
  <p>© 2026 HookManga</p>

  <div class="badge">
    <a href="https://orynth.dev/projects/https-www-hookmanga-biz-id" target="_blank">
      <img src="https://orynth.dev/api/badge/https-www-hookmanga-biz-id?theme=dark">
    </a>
  </div>
</footer>

<script>
function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.menu span').forEach(s=>s.classList.remove('active'));
  event.target.classList.add('active');
}

function generate(){
  const hooks = [
    "He thought it was over… but it was just beginning.",
    "She loved him… but had to kill him.",
    "The world ended yesterday. He remembers.",
    "He became the villain to save her.",
    "One choice changed everything."
  ];
  document.getElementById("output").innerText =
    hooks[Math.floor(Math.random()*hooks.length)];
}

function setLang(lang){
  document.querySelectorAll('[data-en]').forEach(el=>{
    el.innerHTML = el.dataset[lang];
  });
}

setLang("en");
</script>

</body>
</html>
