<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HookManga — AI Viral Hook Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: #070707;
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px;
  border-bottom: 1px solid #222;
}

.logo {
  font-family: 'Bebas Neue';
  font-size: 24px;
  letter-spacing: 2px;
}

.wallet-btn {
  background: #ff3b3b;
  border: none;
  padding: 10px 16px;
  border-radius: 10px;
  color: white;
  font-weight: bold;
}

/* HERO */
.hero {
  padding: 40px 20px;
  text-align: center;
}

.hero h1 {
  font-family: 'Bebas Neue';
  font-size: 42px;
  line-height: 1.1;
}

.hero span {
  color: #ff3b3b;
}

.hero p {
  margin-top: 10px;
  opacity: 0.7;
}

/* GENERATOR */
.generator {
  padding: 20px;
}

.input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
}

.generate-btn {
  width: 100%;
  padding: 14px;
  background: #ff3b3b;
  border: none;
  border-radius: 10px;
  color: white;
  font-weight: bold;
}

/* OUTPUT */
.output {
  margin-top: 20px;
  background: #111;
  padding: 16px;
  border-radius: 12px;
  border: 1px solid #222;
}

.score {
  margin-top: 10px;
  font-size: 12px;
  opacity: 0.7;
}

/* FOOTER */
footer {
  margin-top: 40px;
  padding: 30px 20px;
  text-align: center;
  border-top: 1px solid #222;
}

footer p {
  margin-top: 10px;
  opacity: 0.5;
}

.badge {
  margin-top: 20px;
}

@media(min-width:768px){
  .hero h1{
    font-size: 64px;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">HOOK MANGA</div>
  <button class="wallet-btn">Connect</button>
</header>

<section class="hero">
  <h1>
    INSTANTLY GENERATE<br/>
    <span>VIRAL</span><br/>
    MANGA HOOKS
  </h1>
  <p>Create scroll-stopping anime story hooks in seconds</p>
</section>

<section class="generator">
  <input class="input" id="idea" placeholder="Enter your manga idea..."/>
  <button class="generate-btn" onclick="generate()">Generate Hook</button>

  <div class="output" id="output">
    <b>“He died as a nobody… but woke up as the villain everyone fears.”</b>
    <div class="score">
      Curiosity: 92% • Emotion: 87% • Viral: 95%
    </div>
  </div>
</section>

<footer>
  
  <div class="badge">
    <a href="https://orynth.dev/projects/https-www-hookmanga-biz-id" target="_blank" rel="noopener">
      <img src="https://orynth.dev/api/badge/https-www-hookmanga-biz-id?theme=light&style=default" width="260"/>
    </a>
  </div>

  <p>© 2026 HookManga — AI Story Intelligence Layer</p>
</footer>

<script>
function generate(){
  const ideas = [
    "He was betrayed by his own guild… now he hunts them one by one.",
    "The weakest student suddenly unlocks forbidden magic.",
    "She can see how everyone will die… except herself.",
    "A failed hero gets reborn as the final boss.",
    "They laughed at him… until he broke the system."
  ];

  const random = ideas[Math.floor(Math.random() * ideas.length)];

  document.getElementById("output").innerHTML = `
    <b>"${random}"</b>
    <div class="score">
      Curiosity: ${80 + Math.floor(Math.random()*20)}% • 
      Emotion: ${75 + Math.floor(Math.random()*20)}% • 
      Viral: ${85 + Math.floor(Math.random()*15)}%
    </div>
  `;
}
</script>

</body>
</html>
