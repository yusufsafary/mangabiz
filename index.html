<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HookManga</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter, system-ui, sans-serif;
}

body{
  background:#050505;
  color:white;
  overflow-x:hidden;
}

/* BACKGROUND GLOW */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle at 30% 20%, rgba(255,45,85,0.15), transparent 40%),
             radial-gradient(circle at 70% 80%, rgba(0,120,255,0.12), transparent 40%);
  z-index:-1;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 18px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
}

.logo{
  font-weight:700;
  letter-spacing:1px;
}

.logo span{
  color:#ff2d55;
}

.lang{
  display:flex;
  gap:10px;
  font-size:13px;
}

.lang span{
  opacity:0.6;
  cursor:pointer;
}

.lang span:hover{
  opacity:1;
}

/* MENU */
.menu{
  display:flex;
  justify-content:center;
  gap:25px;
  padding:14px;
  font-size:14px;
}

.menu span{
  opacity:0.5;
  cursor:pointer;
  transition:0.3s;
}

.menu span.active,
.menu span:hover{
  opacity:1;
  color:#ff2d55;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px 30px;
}

.hero h1{
  font-size:26px;
  line-height:1.3;
  margin-bottom:10px;
}

.hero span{
  background:linear-gradient(90deg,#ff2d55,#ff7aa2);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  opacity:0.6;
  font-size:14px;
}

/* CARD */
.card{
  max-width:500px;
  margin:20px auto;
  padding:20px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:16px;
  backdrop-filter:blur(20px);
}

/* INPUT */
textarea{
  width:100%;
  height:120px;
  background:#0f0f0f;
  border:none;
  border-radius:12px;
  padding:14px;
  color:white;
  font-size:14px;
}

/* BUTTON */
button{
  width:100%;
  margin-top:14px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#ff2d55,#ff5c7a);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.02);
  box-shadow:0 0 20px rgba(255,45,85,0.4);
}

/* OUTPUT */
.output{
  margin-top:14px;
  padding:14px;
  background:#0f0f0f;
  border-radius:12px;
  font-size:14px;
}

/* SECTION */
.section{display:none;}
.section.active{display:block;}

/* FOOTER */
footer{
  text-align:center;
  padding:40px 20px;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="bg"></div>

<header>
  <div class="logo">HOOK<span>MANGA</span></div>

  <div class="lang">
    <span onclick="setLang('en')">EN</span>
    <span onclick="setLang('jp')">JP</span>
  </div>
</header>

<div class="menu">
  <span onclick="show('home')" class="active">Home</span>
  <span onclick="show('how')">How</span>
  <span onclick="show('about')">About</span>
  <span onclick="show('legal')">Legal</span>
</div>

<!-- HOME -->
<div id="home" class="section active">

  <div class="hero">
    <h1 data-en="Generate <span>Viral</span> Manga Hooks Instantly"
        data-jp="瞬時に<span>バイラル</span>漫画フックを生成"></h1>

    <p data-en="Emotion-driven hooks for creators in seconds"
       data-jp="クリエイターのための感情的なフックを数秒で生成"></p>
  </div>

  <div class="card">
    <textarea id="input" placeholder="Describe your manga idea..."></textarea>
    <button onclick="generate()">Generate</button>
    <div class="output" id="output">...</div>
  </div>

</div>

<!-- HOW -->
<div id="how" class="section card">
  <h2>How</h2><br>
  <p>Describe → Generate → Go Viral</p>
</div>

<!-- ABOUT -->
<div id="about" class="section card">
  <h2>About</h2><br>
  <p>HookManga is an AI-powered tool designed to craft high-retention story hooks.</p>
</div>

<!-- LEGAL -->
<div id="legal" class="section card">
  <h2>Legal</h2><br>
  <p>All outputs are generated content. Use responsibly.</p>
</div>

<footer>
  © 2026 HookManga
</footer>

<script>
function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.menu span').forEach(s=>s.classList.remove('active'));
  event.target.classList.add('active');
}

function generate(){
  const hooks = [
    "He thought it was over… but it was just the beginning.",
    "She killed him once. Now he’s back.",
    "The world forgot him—but he remembers everything.",
    "He became the villain to save her.",
    "One choice changed everything."
  ];
  document.getElementById("output").innerText =
    hooks[Math.floor(Math.random()*hooks.length)];
}

function setLang(lang){
  document.querySelectorAll('[data-en]').forEach(el=>{
    el.innerHTML = el.dataset[lang];
  });
}

setLang("en");
</script>

</body>
</html>
